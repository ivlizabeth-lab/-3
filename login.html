<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS | Вхід</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>

<header class="header">
  <div class="container header__inner">
    <div class="logo">CS FAN</div>

    <nav class="nav">
      <a href="index.html">ГОЛОВНА</a>
    </nav>

    <a class="btn-ghost" href="login.html">РЕЄСТРАЦІЯ</a>
  </div>
</header>

<!-- Toast помилка -->
<div class="toast" id="toast">
  <div class="toast__icon">!</div>
  <div class="toast__text">
    <div class="toast__title">ПОМИЛКА ВХОДУ</div>
    <div class="toast__msg" id="toastMsg"></div>
  </div>
  <button class="toast__close" type="button" id="toastClose">×</button>
</div>

<main class="page">
  <section class="card">
    <h1 class="card__title">АВТОРИЗАЦІЯ</h1>
    <p class="card__subtitle">Введи логін і пароль, щоб зайти.</p>

    <form id="loginForm" class="form">
      <label class="form__label" for="login">ЛОГІН</label>
      <input class="form__input" id="login" type="text" placeholder="Напр: адмін" />

      <label class="form__label" for="password">ПАРОЛЬ</label>
      <input class="form__input" id="password" type="password" placeholder="Будь-який (поки що)" />

      <button class="btn-red" type="submit">УВІЙТИ</button>
    </form>

    <a class="back" href="index.html">← Назад на головну</a>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
